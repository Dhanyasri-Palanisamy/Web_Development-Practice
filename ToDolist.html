<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        body{
            background:linear-gradient(black, blue,black);
            background-repeat: no-repeat;
            background-attachment:fixed ;
            color : white;
        }
        #box{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap:15px
        }
        input{
            background-color: rgb(195, 203, 184);
            width : 300px;
            height: 50px ;
        }
        /* Add this snippet to your CSS block! 🎨 */
#list li {
    display: flex;             /* Makes this element a flex box */
    flex-direction: row;       /* Forces kids to sit side-by-side */
    align-items: center;       /* Aligns item and button vertically */
    justify-content: space-between; /* Pushes button to the far right */
    gap: 20px;                 /* Adds clean space between text and button */
    width: 300px;              /* Matches your exact input field width */
}
#list button{
    width:100px;
    height:40px;
    background-color: black;
    color:white;
}
 .item-row {
            display: flex;             
            flex-direction: row;       
            align-items: center;       
            justify-content: space-between; 
            gap: 20px;                 
            width: 300px;  
            display: inline-flex; /* Keeps it aligned with the list number */
            vertical-align: middle;
        }
@media print{
    body{
        background-color: white;
        color:black;
    }
    button,input{
        display: none !important;
    }
}

    </Style>
</head>
<body>
    <div id="box">
        <h1>TO-DO List</h1>
        <br>
          <input type="text" id="in" placeholder="Enter list to add">
          <button onclick="additem()">add</button>
          <ol id="list">
           
          </ol>
        <button id="exportp" onclick="exportpdf()">Export as a pdf</button>
    </div>
    <script src=b.js>
       
    </script>
</body>
</html>
